<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jt-glogarch - Login</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
        }
        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 380px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .login-header h1 {
            justify-content: center;
            color: var(--accent);
            font-size: 1.6em;
            margin-bottom: 2px;
        }
        .login-header .version {
            color: var(--text-muted);
            font-size: 0.7em;
            font-weight: normal;
            opacity: 0.7;
        }
        .login-header .subtitle {
            color: var(--text-muted);
            font-size: 0.85em;
        }
        .login-card .form-group { margin-bottom: 18px; }
        .login-card .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            color: var(--text-label);
            font-size: 0.9em;
        }
        .login-card .form-group label svg {
            flex-shrink: 0;
        }
        .login-card input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 1em;
            box-sizing: border-box;
        }
        .login-card button[type="submit"] {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            margin-top: 5px;
            justify-content: center;
        }
        .login-error {
            background: rgba(244, 67, 54, 0.15);
            color: var(--danger);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        .login-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 8px;
        }
        .login-note {
            color: var(--text-muted);
            font-size: 0.8em;
        }
        .login-controls {
            display: flex;
            gap: 6px;
            align-items: stretch;
            height: 32px;
        }
        .login-controls select {
            height: 32px;
            padding: 0 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--text-muted);
            font-size: 0.8em;
            box-sizing: border-box;
        }
        .login-controls .theme-toggle {
            width: 32px;
            min-height: 32px;
            height: 32px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>jt-glogarch <span class="version">v{{ version }}</span></h1>
            <div class="subtitle">Graylog Open Archive</div>
        </div>

        {% if error == "auth_failed" %}
        <div class="login-error" data-i18n="login_failed">Login failed. Please check your Graylog credentials.</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label data-i18n="login_username" data-icon="user">Username</label>
                <input type="text" name="username" placeholder="admin" autofocus required>
            </div>
            <div class="form-group">
                <label data-i18n="login_password" data-icon="lock">Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary" data-i18n="btn_login" data-icon="login"
                onclick="this.disabled=true;this.innerHTML='<span class=spinner-text>...</span>';this.form.submit()">Login</button>
        </form>

        <div class="login-footer">
            <span class="login-note" data-i18n="login_note">Authenticates via Graylog API</span>
            <div class="login-controls">
                <select id="lang-select" onchange="setLang(this.value)">
                    <option value="en">EN</option>
                    <option value="zh-TW">中文</option>
                </select>
                <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></button>
            </div>
        </div>
    </div>

    <script>document.cookie='session=;path=/;expires=Thu, 01 Jan 1970 00:00:00 GMT';</script>
    <script src="/static/js/i18n.js"></script>
</body>
</html>
